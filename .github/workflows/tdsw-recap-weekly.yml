name: TDSW Weekly Contributions

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-contributions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./recap

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run contribution checker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          WEBHOOK_URL: ${{ secrets.TDSW_WEBHOOK_URL }}
          CHANNEL_ID: "940127956276224020"
          FANDOM_SUBDOMAIN: "tds"
          EMBED_COLOR: "00ff00"
          PROJECT_DIR: "tdsw"
        run: bun run index.js

      - name: Commit push
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add ../data/recap/tdsw/
          git diff --cached --quiet || (git commit -m "chore: tdsw weekly data" && git push)
